<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1A0F08" />
  <title>Lharmonie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">Lharmonie</div>
    <div class="login-tagline">Sistema de gestión</div>
    <div class="login-field">
      <input type="text" id="loginUser" placeholder="Usuario" autocomplete="off" autocapitalize="none" />
    </div>
    <div class="login-field">
      <input type="password" id="loginPass" placeholder="Contraseña" />
    </div>
    <button class="login-submit" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- MODAL PAGO -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalProveedor">—</div>
    <div class="modal-sub" id="modalNro">—</div>
    <div class="modal-monto" id="modalMonto">—</div>
    <div id="modalDetalles"></div>
    <div class="modal-actions">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-confirmar" id="btnConfirmar" onclick="confirmarPago()">✓ Marcar como pagada</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- APP -->
<div class="app" id="appShell" style="display:none;">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-brand">Lharmonie</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="btn-refresh" id="btnRefresh" onclick="loadAll()" title="Actualizar">↻</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- RESUMEN -->
    <div class="page active" id="page-resumen">
      <div class="summary-header">
        <div class="summary-total-label">Total a pagar</div>
        <div class="summary-total-value" id="summaryTotal">—</div>
        <div class="summary-total-sub" id="summaryCount">cargando…</div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Pagado</div>
          <div class="stat-value" id="statPagado">—</div>
          <div class="stat-sub" id="statPagadoCount">— facturas</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Proveedores</div>
          <div class="stat-value" id="statProveedores">—</div>
          <div class="stat-sub">registrados</div>
        </div>
      </div>

      <div class="section-title">Deuda por proveedor</div>
      <div class="prov-list" id="provList">
        <div class="loading-state">Cargando…</div>
      </div>
    </div>

    <!-- A PAGAR -->
    <div class="page" id="page-apagar">
      <div class="section-title" id="apagarTitle">Facturas pendientes</div>
      <div class="facturas-list" id="apagarList">
        <div class="loading-state">Cargando…</div>
      </div>
    </div>

    <!-- HISTORIAL -->
    <div class="page" id="page-historial">
      <div class="section-title">Facturas pagadas</div>
      <div class="historial-list" id="historialList">
        <div class="loading-state">Cargando…</div>
      </div>
    </div>

    <!-- BUSCAR -->
    <div class="page" id="page-buscar">
      <div class="search-bar-wrap">
        <input class="search-bar" type="search" id="searchInput"
          placeholder="Buscar proveedor, monto, local…"
          oninput="renderBuscar()" autocomplete="off" />
      </div>
      <div class="search-results" id="searchResults">
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          Escribí para buscar
        </div>
      </div>
    </div>


    <!-- PROVEEDORES -->
    <div class='page' id='page-proveedores'>
      <div class='search-bar-wrap'>
        <input class='search-bar' type='search' id='provSearch' placeholder='Buscar proveedor…' oninput='renderProveedores()' autocomplete='off' />
      </div>
      <div class='search-results' id='provList2'><div class='loading-state'>Cargando…</div></div>
    </div>

    <!-- ARTICULOS -->
    <div class='page' id='page-articulos'>
      <div class='search-bar-wrap'>
        <input class='search-bar' type='search' id='artSearch' placeholder='Buscar artículo…' oninput='renderArticulos()' autocomplete='off' />
      </div>
      <div class='search-results' id='artList'><div class='loading-state'>Cargando…</div></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-tab active" onclick="showPage('resumen',this)" id="tab-resumen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
      Resumen
    </button>
    <button class="nav-tab" onclick="showPage('apagar',this)" id="tab-apagar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="9"/>
        <polyline points="12 7 12 12 15 15"/>
      </svg>
      A pagar
      <span class="nav-badge" id="navBadge"></span>
    </button>
    <button class="nav-tab" onclick="showPage('historial',this)" id="tab-historial">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <polyline points="9 11 12 14 22 4"/>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      Pagadas
    </button>
    <button class="nav-tab" onclick="showPage('buscar',this)" id="tab-buscar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Buscar
    </button>
    <button class='nav-tab' onclick="showPage('proveedores',this)" id='tab-proveedores'>
      <svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8'>
        <path d='M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z'/>
        <polyline points='9 22 9 12 15 12 15 22'/>
      </svg>
      Proveedores
    </button>
    <button class='nav-tab' onclick="showPage('articulos',this)" id='tab-articulos'>
      <svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8'>
        <line x1='8' y1='6' x2='21' y2='6'/><line x1='8' y1='12' x2='21' y2='12'/><line x1='8' y1='18' x2='21' y2='18'/>
        <line x1='3' y1='6' x2='3.01' y2='6'/><line x1='3' y1='12' x2='3.01' y2='12'/><line x1='3' y1='18' x2='3.01' y2='18'/>
      </svg>
      Artículos
    </button>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
